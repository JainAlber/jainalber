name: ocean-sync

on:
  schedule:
    - cron: "0 0 * * 0"   # every Sunday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate the ocean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m ocean.generate

      - name: Commit and push if the ocean changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "ocean unchanged — nothing to commit"
          else
            git commit -m "🌊 ocean sync: regenerate ecosystem"
            git push
          fi

      # Vercel is connected to JainAlber/ocean-asset and redeploys on push,
      # so the README's <img> always serves the latest animated scene.
      - name: Publish SVG to the asset repo (Vercel serves it)
        env:
          ASSET_TOKEN: ${{ secrets.OCEAN_ASSET_TOKEN }}
        run: |
          if [ -z "$ASSET_TOKEN" ]; then
            echo "::warning::OCEAN_ASSET_TOKEN secret not set — skipping Vercel asset publish"
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${ASSET_TOKEN}@github.com/JainAlber/ocean-asset.git" /tmp/ocean-asset
          cp assets/ocean.svg /tmp/ocean-asset/ocean.svg
          cd /tmp/ocean-asset
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ocean.svg
          if git diff --cached --quiet; then
            echo "asset unchanged — nothing to publish"
          else
            git commit -m "🌊 ocean sync: update animated scene"
            git push
          fi
