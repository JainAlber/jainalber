name: ocean-sync

on:
  schedule:
    - cron: "0 0 * * 0"   # every Sunday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate the ocean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m ocean.generate

      - name: Commit and push if the ocean changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "ocean unchanged — nothing to commit"
          else
            git commit -m "🌊 ocean sync: regenerate ecosystem"
            git push
          fi
